{% extends 'base.html' %}
{% block title %}My Profile — BorrowBondhu{% endblock %}

{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-7">
      <h2 class="fw-bold mb-4"><i class="bi bi-person-circle text-success"></i> My Profile</h2>
      <div class="card p-4 shadow-sm">
        <form method="post" enctype="multipart/form-data">
          {% csrf_token %}
          <div class="row g-3 mb-3">
            <div class="col">
              <label class="form-label fw-semibold">First Name</label>
              <input type="text" name="first_name" class="form-control" value="{{ user.first_name }}">
            </div>
            <div class="col">
              <label class="form-label fw-semibold">Last Name</label>
              <input type="text" name="last_name" class="form-control" value="{{ user.last_name }}">
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Email</label>
            <input type="email" name="email" class="form-control" value="{{ user.email }}">
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Phone</label>
            <input type="text" name="phone" class="form-control" value="{{ form.instance.phone }}">
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Bio</label>
            <textarea name="bio" class="form-control" rows="3">{{ form.instance.bio }}</textarea>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Avatar</label>
            {% if form.instance.avatar %}
            <div class="mb-2"><img src="{{ form.instance.avatar.url }}" class="rounded-circle" width="80" height="80" style="object-fit:cover;"></div>
            {% endif %}
            <input type="file" name="avatar" class="form-control">
          </div>
          <div class="d-grid">
            <button type="submit" class="btn btn-success">Save Changes</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
