{% extends 'base.html' %}
{% block title %}Login — BorrowBondhu{% endblock %}

{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="card p-4 shadow-sm">
        <div class="text-center mb-4">
          <i class="bi bi-box-arrow-in-right display-5 text-success"></i>
          <h3 class="fw-bold mt-2">Welcome Back</h3>
          <p class="text-muted">Login to your account</p>
        </div>
        <form method="post">
          {% csrf_token %}
          <div class="mb-3">
            <label class="form-label fw-semibold">Username</label>
            <input type="text" name="username" class="form-control" required autofocus>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Password</label>
            <input type="password" name="password" class="form-control" required>
          </div>
          <div class="d-grid mt-3">
            <button type="submit" class="btn btn-success btn-lg">Login</button>
          </div>
        </form>
        <p class="text-center mt-3 text-muted">Don't have an account? <a href="{% url 'register' %}">Sign up</a></p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
